name: Newsletter BRVM quotidienne

on:
  schedule:
    # On génère le numéro LA VEILLE : le cron tourne le jour J et produit l'édition de J+1.
    #   dimanche → numéro de lundi | lundi → mardi | … | jeudi → vendredi
    # → jours d'exécution = dimanche à jeudi (cron day-of-week 0-4), pour des éditions
    #   du lundi au vendredi. Ainsi le brouillon est prêt la veille au soir.
    # Cible horaire : 18h Paris. GitHub Actions est en UTC sans heure d'été.
    # On ne programme JAMAIS pile à l'heure ronde : GitHub documente que le début de
    # chaque heure est le pic de congestion des runners partagés (retard observé jusqu'à
    # ~1h45 sur ce repo avec "0 16 * * 0-4"). On décale donc la minute à :16, et on avance
    # l'horaire nominal pour absorber ce retard moyen et retomber près de 18h Paris.
    # 15:16 UTC = 17:16 Paris (été, nominal) ; en hiver, mêmes minutes mais UTC+1 au lieu
    # de UTC+2 → passer à "16 16 * * 0-4" pour conserver la même cible ~17-18h Paris.
    - cron: "16 15 * * 0-4"
  workflow_dispatch:          # permet de lancer à la main depuis l'onglet Actions
    inputs:
      no_publish:
        description: "Générer sans publier sur Ghost (true/false)"
        default: "false"
      edition_date:
        description: "Date d'édition YYYY-MM-DD (vide = demain)"
        default: ""

concurrency:
  group: newsletter-brvm
  cancel-in-progress: false

permissions:
  contents: write   # nécessaire pour committer history.json (mémoire anti-répétition)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Générer et publier la newsletter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          PUBLISH_STATUS: ${{ secrets.PUBLISH_STATUS }}
          MODEL_QUALIFY: ${{ vars.MODEL_QUALIFY }}
          MODEL_SELECT: ${{ vars.MODEL_SELECT }}
          MODEL_WRITE: ${{ vars.MODEL_WRITE }}
        run: |
          # Date d'édition = celle fournie à la main, sinon DEMAIN (numéro de la veille).
          DATE="${{ github.event.inputs.edition_date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u -d '+1 day' +%Y-%m-%d); fi
          echo "Édition générée : $DATE"
          if [ "${{ github.event.inputs.no_publish }}" = "true" ]; then
            python run.py --date "$DATE" --no-publish --hybrid-body
          else
            python run.py --date "$DATE" --hybrid-body
          fi

      - name: Persister les mémoires (history.json + topics.json)
        if: always()
        run: |
          git config user.name "cauri-bot"
          git config user.email "cauri-bot@users.noreply.github.com"
          git add history.json topics.json
          git diff --cached --quiet || git commit -m "chore: maj mémoires anti-répétition [skip ci]"
          git push || echo "rien à pousser"

      - name: Archiver les artefacts (HTML + JSON intermédiaires)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: out/
          retention-days: 14
